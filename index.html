<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Mum</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
color:white;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#count{
font-size:100px;
}

#heart{
font-size:80px;
display:none;
}

#title{
font-size:40px;
display:none;
margin-bottom:20px;
}

.gallery{
display:none;
}

.gallery img{
width:300px;
border-radius:15px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<div id="count">3</div>

<div id="heart">❤️</div>

<div id="title">Happy birthday, my mum 🥳</div>

<div class="gallery">
<img id="photo" src="photo1.jpg">
<br>
<button onclick="prev()">←</button>
<button onclick="next()">→</button>
</div>

<script>

let count=3

let timer=setInterval(()=>{
count--
document.getElementById("count").innerText=count

if(count==0){
clearInterval(timer)

document.getElementById("count").style.display="none"
document.getElementById("heart").style.display="block"
document.getElementById("title").style.display="block"
document.querySelector(".gallery").style.display="block"

}

},1000)

let photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg"
]

let index=0

function show(){
document.getElementById("photo").src=photos[index]
}

function next(){
index++
if(index>=photos.length) index=0
show()
}

function prev(){
index--
if(index<0) index=photos.length-1
show()
}

</script>

</body>
</html>
