<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для мамы ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9ecf,#ff6aa6);
overflow:hidden;
text-align:center;
color:white;
}

/* инструкция */

#hint{
position:absolute;
top:20%;
width:100%;
font-size:28px;
text-shadow:0 4px 20px rgba(0,0,0,0.3);
}

/* коробка */

#gift{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
cursor:pointer;
animation:shake 2s infinite;
}

@keyframes shake{
0%{transform:translate(-50%,-50%) rotate(0)}
25%{transform:translate(-50%,-50%) rotate(-6deg)}
50%{transform:translate(-50%,-50%) rotate(6deg)}
75%{transform:translate(-50%,-50%) rotate(-4deg)}
100%{transform:translate(-50%,-50%) rotate(0)}
}

/* поздравление */

#title{
position:absolute;
top:10%;
width:100%;
font-size:44px;
font-weight:bold;
display:none;
animation:drop 1.5s ease;
text-shadow:0 6px 25px rgba(0,0,0,0.4);
}

@keyframes drop{
from{
opacity:0;
transform:translateY(-80px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* фото */

#photoBox{
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
display:none;
}

#photo{
width:75vw;
max-width:520px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
animation:pop 1s;
}

@keyframes pop{
from{
transform:scale(0.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

/* canvas */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>

</head>

<body>

<div id="hint">
У меня для тебя есть подарок 🎁<br>
Нажми на коробку
</div>

<div id="gift">🎁</div>

<div id="title">
С днём рождения, мамуля ❤️!<br>
Люблю тебя!
</div>

<div id="photoBox">
<img id="photo" src="photo1.jpg">
</div>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

/* CONFETTI */

let confetti=[]

function createConfetti(){

for(let i=0;i<250;i++){

confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*8+3,
speed:Math.random()*3+2
})

}

}

function drawConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height)

confetti.forEach(c=>{

ctx.fillStyle=["#fff","#ff2fa0","#ffd1e8","#ff7db8","#ffe066"][Math.floor(Math.random()*5)]

ctx.fillRect(c.x,c.y,c.size,c.size)

c.y+=c.speed

if(c.y>canvas.height) c.y=0

})

requestAnimationFrame(drawConfetti)

}

/* HEARTS */

let hearts=[]

function createHearts(){

for(let i=0;i<80;i++){

hearts.push({
x:canvas.width/2,
y:canvas.height/2,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6
})

}

}

function drawHearts(){

hearts.forEach(h=>{

ctx.font="24px Arial"
ctx.fillText("❤️",h.x,h.y)

h.x+=h.vx
h.y+=h.vy

})

requestAnimationFrame(drawHearts)

}

/* PHOTOS */

const photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg"
]

let index=0

function nextPhoto(){

index++

if(index>=photos.length) return

let img=document.getElementById("photo")

img.style.opacity=0

setTimeout(()=>{
img.src=photos[index]
img.style.opacity=1
},400)

}

/* CLICK GIFT */

document.getElementById("gift").onclick=()=>{

document.getElementById("gift").style.display="none"
document.getElementById("hint").style.display="none"

document.getElementById("title").style.display="block"
document.getElementById("photoBox").style.display="block"

createConfetti()
createHearts()

drawConfetti()
drawHearts()

setInterval(nextPhoto,4000)

}

</script>

</body>
</html>
