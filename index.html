<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для мамы ❤️</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
text-align:center;
}

/* canvas */

canvas{
position:fixed;
top:0;
left:0;
}

/* countdown */

#count{
position:absolute;
top:35%;
width:100%;
font-size:120px;
font-weight:bold;
}

/* heart */

#heart{
position:absolute;
top:30%;
width:100%;
font-size:150px;
display:none;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

/* text */

#text{
position:absolute;
top:50%;
width:100%;
font-size:42px;
display:none;
animation:fly 2s ease;
}

@keyframes fly{
from{
opacity:0;
transform:translateY(80px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* gallery */

#gallery{
position:absolute;
top:65%;
width:100%;
display:none;
}

#gallery img{
width:85vw;
max-width:900px;
border-radius:25px;
box-shadow:0 0 40px pink;
transition:opacity 1s;
}

</style>

</head>

<body>

<canvas id="canvas"></canvas>

<div id="count">3</div>

<div id="heart">❤️</div>

<div id="text">
С днем рождения, мамуля ❤️!<br>
Люблю тебя!
</div>

<div id="gallery">
<img id="photo" src="photo1.jpg">
</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

/* MATRIX */

const letters="01"
const fontSize=18
const columns=canvas.width/fontSize
const drops=[]

for(let x=0;x<columns;x++) drops[x]=1

function matrix(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#ff69b4"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

let matrixInterval=setInterval(matrix,35)

/* COUNTDOWN */

let count=3

let counter=setInterval(()=>{

count--

document.getElementById("count").innerText=count

if(count===0){

clearInterval(counter)
document.getElementById("count").style.display="none"

clearInterval(matrixInterval)

setTimeout(createHeart,500)

}

},1500)

/* HEART FROM PARTICLES */

let particles=[]

function heartX(t){
return 16*Math.pow(Math.sin(t),3)
}

function heartY(t){
return -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
}

function createHeart(){

for(let i=0;i<1000;i++){

let t=Math.random()*Math.PI*2

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
tx:canvas.width/2 + heartX(t)*15,
ty:canvas.height/2 + heartY(t)*15
})

}

animateHeart()

}

function animateHeart(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#ff69b4"

particles.forEach(p=>{

p.x+=(p.tx-p.x)*0.05
p.y+=(p.ty-p.y)*0.05

ctx.fillText("0",p.x,p.y)

})

requestAnimationFrame(animateHeart)

setTimeout(showHeart,3000)

}

/* HEART */

function showHeart(){

document.getElementById("heart").style.display="block"

explodeHearts()

setTimeout(showText,2500)

}

/* HEART EXPLOSION */

let hearts=[]

function explodeHearts(){

for(let i=0;i<120;i++){

hearts.push({
x:canvas.width/2,
y:canvas.height/2,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8
})

}

}

function drawHearts(){

hearts.forEach(h=>{

ctx.fillStyle="#ff69b4"
ctx.font="20px Arial"
ctx.fillText("❤",h.x,h.y)

h.x+=h.vx
h.y+=h.vy

})

requestAnimationFrame(drawHearts)

}

drawHearts()

/* TEXT */

function showText(){

document.getElementById("text").style.display="block"

setTimeout(startGallery,2000)

}

/* GALLERY */

const photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg"
]

let index=0

function startGallery(){

document.getElementById("gallery").style.display="block"

setInterval(()=>{

index++
if(index>=photos.length) index=0

let img=document.getElementById("photo")

img.style.opacity=0

setTimeout(()=>{
img.src=photos[index]
img.style.opacity=1
},500)

},4000)

}

</script>

</body>
</html>
