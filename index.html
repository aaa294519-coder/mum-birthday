<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для мамы ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9ecf,#ff6aa6);
overflow:hidden;
text-align:center;
color:white;
}

/* кнопка */

#start{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
padding:20px 40px;
border:none;
border-radius:20px;
background:white;
color:#ff4fa0;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* текст */

#title{
position:absolute;
top:10%;
width:100%;
font-size:42px;
display:none;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;transform:translateY(-40px)}
to{opacity:1}
}

/* фото */

.photo{
position:absolute;
width:260px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transform:rotate(-5deg);
animation:pop 1s;
}

@keyframes pop{
from{
transform:scale(0) rotate(-20deg);
opacity:0;
}
to{
transform:scale(1) rotate(-5deg);
opacity:1;
}
}

/* canvas */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>

</head>

<body>

<button id="start">Открыть подарок 🎁</button>

<div id="title">
С днём рождения, мамуля ❤️!<br>
Люблю тебя!
</div>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

/* CONFETTI */

let confetti=[]

function createConfetti(){

for(let i=0;i<200;i++){

confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*8+3,
speed:Math.random()*3+2
})

}

}

function drawConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height)

confetti.forEach(c=>{

ctx.fillStyle=["#fff","#ff2fa0","#ffd1e8","#ff7db8"][Math.floor(Math.random()*4)]

ctx.fillRect(c.x,c.y,c.size,c.size)

c.y+=c.speed

if(c.y>canvas.height) c.y=0

})

requestAnimationFrame(drawConfetti)

}

/* PHOTO SHOW */

const photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg"
]

let index=0

function showPhoto(){

const img=document.createElement("img")

img.src=photos[index]

img.className="photo"

img.style.top=Math.random()*70+"%"
img.style.left=Math.random()*80+"%"
img.style.transform="rotate("+(Math.random()*20-10)+"deg)"

document.body.appendChild(img)

index++
if(index>=photos.length) index=0

}

/* START */

document.getElementById("start").onclick=()=>{

document.getElementById("start").style.display="none"

document.getElementById("title").style.display="block"

createConfetti()
drawConfetti()

showPhoto()

setInterval(showPhoto,4000)

}

</script>

</body>
</html>
