<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для мамы ❤️</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
color:white;
text-align:center;
}

/* canvas */

canvas{
position:fixed;
top:0;
left:0;
}

/* countdown */

#count{
position:absolute;
top:40%;
width:100%;
font-size:130px;
font-weight:bold;
}

/* heart */

#heart{
position:absolute;
top:35%;
width:100%;
font-size:160px;
display:none;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.35)}
100%{transform:scale(1)}
}

/* text */

#text{
position:absolute;
top:55%;
width:100%;
font-size:46px;
display:none;
animation:fly 2s ease;
}

@keyframes fly{
from{
opacity:0;
transform:translateY(120px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* gallery */

#gallery{
position:absolute;
bottom:3%;
width:100%;
display:none;
}

.photo{
width:900px;
max-width:92%;
border-radius:25px;
box-shadow:0 0 40px pink;
position:absolute;
left:50%;
transform:translateX(-50%) rotate(-3deg);
opacity:0;
animation:photoAppear 1s forwards;
}

@keyframes photoAppear{
from{
opacity:0;
transform:translateX(-50%) scale(0.8) rotate(-10deg);
}
to{
opacity:1;
transform:translateX(-50%) scale(1) rotate(-3deg);
}
}

</style>

</head>

<body>

<canvas id="canvas"></canvas>

<div id="count">3</div>

<div id="heart">❤️</div>

<div id="text">
С днем рождения, мамуля ❤️!<br>
Люблю тебя!
</div>

<div id="gallery"></div>

<script>

/* canvas */

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

/* MATRIX */

const letters="01"
const fontSize=18
const columns=canvas.width/fontSize
const drops=[]

for(let x=0;x<columns;x++) drops[x]=1

function matrix(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#ff69b4"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

let matrixInterval=setInterval(matrix,35)

/* COUNTDOWN */

let count=3

let counter=setInterval(()=>{

count--

document.getElementById("count").innerText=count

if(count===0){

clearInterval(counter)
document.getElementById("count").style.display="none"

clearInterval(matrixInterval)

setTimeout(showHeart,600)

}

},1500)

/* HEART */

function showHeart(){

document.getElementById("heart").style.display="block"

explodeHearts()

setTimeout(showText,2500)

}

/* HEART EXPLOSION */

let hearts=[]

function explodeHearts(){

for(let i=0;i<120;i++){

hearts.push({
x:canvas.width/2,
y:canvas.height/2,
vx:(Math.random()-0.5)*8,
vy:(Math.random()-0.5)*8,
size:Math.random()*6+4
})

}

}

function drawHearts(){

ctx.clearRect(0,0,canvas.width,canvas.height)

hearts.forEach(h=>{

ctx.fillStyle="#ff69b4"
ctx.font=h.size+"px Arial"
ctx.fillText("❤",h.x,h.y)

h.x+=h.vx
h.y+=h.vy

})

requestAnimationFrame(drawHearts)

}

drawHearts()

/* TEXT */

function showText(){

document.getElementById("text").style.display="block"

setTimeout(startGallery,2500)

}

/* PHOTO GALLERY */

const photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg"
]

let index=0

function startGallery(){

const gallery=document.getElementById("gallery")

gallery.style.display="block"

setInterval(()=>{

gallery.innerHTML=""

let img=document.createElement("img")

img.src=photos[index]

img.className="photo"

gallery.appendChild(img)

index++
if(index>=photos.length) index=0

},4000)

}

</script>

</body>
</html>
