<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для мамы ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9ecf,#ff6aa6);
overflow:hidden;
text-align:center;
}

/* шарики */

#balloons{
position:fixed;
bottom:-150px;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

.balloon{
position:absolute;
font-size:60px;
animation:float 12s linear infinite;
opacity:0.8;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-120vh)}
}

/* canvas */

canvas{
position:fixed;
top:0;
left:0;
z-index:1;
pointer-events:none;
}

/* текст */

#hint{
position:absolute;
top:20%;
width:100%;
font-size:28px;
color:black;
z-index:3;
}

#title{
position:absolute;
top:10%;
width:100%;
font-size:44px;
font-weight:bold;
color:black;
display:none;
z-index:3;
}

#love{
position:absolute;
top:40%;
width:100%;
font-size:60px;
font-weight:bold;
color:red;
display:none;
z-index:3;
}

/* подарок */

#gift{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
cursor:pointer;
z-index:3;
animation:shake 2s infinite;
}

@keyframes shake{
0%{transform:translate(-50%,-50%) rotate(0)}
25%{transform:translate(-50%,-50%) rotate(-6deg)}
50%{transform:translate(-50%,-50%) rotate(6deg)}
75%{transform:translate(-50%,-50%) rotate(-4deg)}
100%{transform:translate(-50%,-50%) rotate(0)}
}

/* фото контейнер */

#photoBox{
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
width:80vw;
max-width:520px;
height:65vh;
overflow:hidden;
display:none;
z-index:3;
}

/* слайдер */

#slider{
display:flex;
height:100%;
transition:transform 0.8s ease;
}

.slide{
min-width:100%;
display:flex;
align-items:center;
justify-content:center;
}

.slide img{
width:100%;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

</style>
</head>

<body>

<div id="balloons"></div>

<div id="hint">
У меня для тебя есть подарок 🎁<br>
Нажми на коробку
</div>

<div id="gift">🎁</div>

<div id="title">
С днём рождения, мамуля ❤️!
</div>

<div id="love">
Люблю тебя ❤️❤️❤️
</div>

<div id="photoBox">

<div id="slider">

<div class="slide"><img src="photo1.jpg"></div>
<div class="slide"><img src="photo2.jpg"></div>
<div class="slide"><img src="photo3.jpg"></div>
<div class="slide"><img src="photo4.jpg"></div>
<div class="slide"><img src="photo5.jpg"></div>

</div>

</div>

<audio id="music" src="music.mp3"></audio>

<canvas id="canvas"></canvas>

<script>

/* шарики */

const balloonBox=document.getElementById("balloons")

for(let i=0;i<12;i++){

let b=document.createElement("div")
b.className="balloon"
b.innerHTML="🎈"

b.style.left=Math.random()*100+"%"
b.style.animationDuration=(10+Math.random()*8)+"s"
b.style.fontSize=(40+Math.random()*40)+"px"

balloonBox.appendChild(b)

}

/* конфетти */

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let confetti=[]

function createConfetti(){

for(let i=0;i<150;i++){

confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*6+2,
speed:Math.random()*3+1
})

}

}

function drawConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height)

confetti.forEach(c=>{

ctx.fillStyle=["#fff","#ff2fa0","#ffd1e8","#ff7db8","#ffe066"][Math.floor(Math.random()*5)]

ctx.fillRect(c.x,c.y,c.size,c.size)

c.y+=c.speed

if(c.y>canvas.height) c.y=0

})

requestAnimationFrame(drawConfetti)

}

/* слайдер */

let current=0
let total=5
let slider=document.getElementById("slider")
let timer

function nextSlide(){

current++

if(current>=total){

clearInterval(timer)

document.getElementById("photoBox").style.display="none"
document.getElementById("love").style.display="block"

return
}

slider.style.transform="translateX(-"+current*100+"%)"

}

/* клик */

document.getElementById("gift").onclick=()=>{

document.getElementById("gift").style.display="none"
document.getElementById("hint").style.display="none"

document.getElementById("title").style.display="block"
document.getElementById("photoBox").style.display="block"

document.getElementById("music").play()

createConfetti()
drawConfetti()

timer=setInterval(nextSlide,2500)

}

</script>

</body>
</html>
